  # ─────────────────────────────────────────────────────────────
  # 🗺️ GUIDES DE L'ÎLE  (Island Guides)
  # ─────────────────────────────────────────────────────────────
  - name: island_guides
    label: "🗺️ Guides de l'île"
    description: "Articles longs sur Ngor Island (Things to do, History, Surf spots…). Éditez les locales (en, fr, es…) imbriquées dans chaque guide."
    folder: content/island_guides
    create: false
    format: json
    extension: json
    slug: "{{guide_id}}"
    summary: "🗺️ {{guide_id}} · pub: {{date_published}}"
    fields:
      - {label: "ID du guide", name: guide_id, widget: string, hint: "Ex: things-to-do (ne pas modifier)"}
      - {label: "Image hero (basename)", name: hero_basename, widget: string, hint: "Nom du fichier image sans extension"}
      - {label: "Date de publication", name: date_published, widget: string, hint: "Format: YYYY-MM-DD (ex: 2026-03-27)", pattern: ["^\\d{4}-\\d{2}-\\d{2}$", "Format attendu: YYYY-MM-DD"]}
      - label: "Slugs par langue"
        name: slugs
        widget: object
        fields:
          - {label: "EN", name: en, widget: string}
          - {label: "FR", name: fr, widget: string}
          - {label: "ES", name: es, widget: string}
          - {label: "IT", name: it, widget: string}
          - {label: "DE", name: de, widget: string}
          - {label: "NL", name: nl, widget: string}
          - {label: "AR", name: ar, widget: string}

  # ─────────────────────────────────────────────────────────────
  # 📝 ARTICLES BLOG — EN (source principale)
  # ─────────────────────────────────────────────────────────────
  - name: articles_en
    label: "📝 Articles — 🇬🇧 EN"
    label_singular: "Article EN"
    folder: content/articles_v2/en
    create: true
    format: json
    slug: "{{slug}}"
    summary: "{{title}} · {{category}}"
    sortable_fields: ["title", "category", "reading_time"]
    view_filters:
      - {label: "Surf & Spots", field: category, pattern: "Surf Conditions & Spots"}
      - {label: "Coaching", field: category, pattern: "Coaching & Progression"}
      - {label: "Island Life", field: category, pattern: "Island Life & Surf Camp"}
    fields:
      - {label: "📌 Titre", name: title, widget: string, hint: "Titre SEO (55–70 car.)"}
      - {label: "🔗 Slug (URL)", name: slug, widget: string, hint: "ex: best-time-to-surf-senegal", pattern: ['^[a-z0-9-]+$', "Minuscules, chiffres, tirets"]}
      - label: "📂 Catégorie"
        name: category
        widget: select
        options: ["Surf Conditions & Spots", "Coaching & Progression", "Island Life & Surf Camp"]
