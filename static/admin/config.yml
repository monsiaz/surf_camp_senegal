backend:
  name: github
  repo: monsiaz/surf_camp_senegal
  branch: main
  base_url: https://surf-camp-senegal.vercel.app
  auth_endpoint: api/auth

media_folder: content/images
public_folder: /assets/images

locale: fr
publish_mode: simple

# ════════════════════════════════════════════════════════════════
# CHAMPS PARTAGÉS — définis ici une seule fois pour référence
# (Decap CMS ne supporte pas les ancres YAML nativement en prod,
#  on duplique les champs — mais la structure est lisible)
# ════════════════════════════════════════════════════════════════

collections:

  # ─────────────────────────────────────────────────────────────
  # 🏠 PAGE ACCUEIL  (Homepage)
  # ─────────────────────────────────────────────────────────────
  - name: page_homepage
    label: "🏠 Accueil"
    description: "Textes SEO et contenus de la page d'accueil, par langue."
    files:
      - name: hp_en
        label: "🇬🇧 English"
        file: content/pages/en_homepage.json
        fields: &page_fields
          - {label: "🔤 Title tag", name: title_tag, widget: string, hint: "Affiché dans l'onglet et sur Google (55–65 car.)"}
          - {label: "📝 Meta description", name: meta_description, widget: text, hint: "Max 160 caractères"}
          - {label: "🎯 H1 — Titre principal", name: h1, widget: string}
          - {label: "💬 Sous-titre hero", name: hero_subtitle, widget: string, required: false}
          - {label: "📖 Introduction", name: intro, widget: text, required: false}
          - label: "📋 Sections"
            name: sections
            widget: list
            required: false
            summary: "{{fields.h2}}"
            fields:
              - {label: "H2", name: h2, widget: string}
              - {label: "Contenu", name: content, widget: text}
              - label: "Puces (bullets)"
                name: bullets
                widget: list
                required: false
                field: {label: Ligne, name: line, widget: string}
          - {label: "CTA — Titre", name: cta_heading, widget: string, required: false}
          - {label: "CTA — Texte", name: cta_text, widget: text, required: false}
          - {label: "CTA — Bouton", name: cta_button, widget: string, required: false}
          - {label: "OG Title", name: og_title, widget: string, required: false, hint: "Titre pour partages réseaux sociaux"}
          - {label: "OG Description", name: og_description, widget: text, required: false}
          - {label: "Focus keyword", name: focus_keyword, widget: string, required: false, hint: "Mot-clé SEO principal"}
          - {label: "Slug (URL)", name: slug, widget: hidden, default: "/"}
          - {label: "Langue", name: lang, widget: hidden, default: "en"}
          - {label: "Page name", name: page_name, widget: hidden, default: "Homepage"}

      - name: hp_fr
        label: "🇫🇷 Français"
