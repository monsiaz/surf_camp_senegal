<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Disponibilités — Ngor Surfcamp Admin</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--navy:#0a2540;--fire:#ff5a1f;--green:#22c55e;--sand:#f0c060}
  body{font-family:"Inter",system-ui,sans-serif;background:#f8fafc;color:#1e293b}
  .top-bar{background:var(--navy);color:#fff;padding:14px 24px;display:flex;align-items:center;gap:16px}
  .top-bar h1{font-size:16px;font-weight:800;flex:1}
  .top-bar a{color:rgba(255,255,255,.7);text-decoration:none;font-size:13px;font-weight:600;padding:5px 12px;border:1px solid rgba(255,255,255,.15);border-radius:6px}
  .top-bar a:hover{color:#fff;background:rgba(255,255,255,.08)}
  .wrap{max-width:1100px;margin:0 auto;padding:24px}
  .toolbar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px;align-items:center}
  .toolbar select,.toolbar input{padding:8px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;font-family:inherit}
  .btn{padding:8px 18px;border:none;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;transition:all .15s}
  .btn-fire{background:var(--fire);color:#fff}.btn-fire:hover{background:#e04a10}
  .btn-navy{background:var(--navy);color:#fff}.btn-navy:hover{background:#0d2d50}
  .btn-outline{background:#fff;border:1px solid #d1d5db;color:#374151}.btn-outline:hover{background:#f1f5f9}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:24px}
  .dow{text-align:center;font-size:11px;font-weight:700;color:#94a3b8;padding:8px 0;text-transform:uppercase}
  .cell{background:#fff;border:2px solid transparent;border-radius:10px;padding:8px 6px;text-align:center;cursor:pointer;transition:all .12s;min-height:72px;position:relative}
  .cell:hover{border-color:#cbd5e1;box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .cell.selected{border-color:var(--fire);background:#fff7f5}
  .cell.past{opacity:.35;cursor:default}
  .cell .day{font-size:14px;font-weight:700;color:#1e293b}
  .cell .price{font-size:12px;font-weight:700;color:var(--green);margin-top:2px}
  .cell .avail{font-size:10px;color:#94a3b8;margin-top:1px}
  .cell.full .price{color:#dc2626}
  .cell.low .price{color:#d97706}
  .empty{min-height:72px}
  .editor{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:24px;margin-bottom:24px}
  .editor h3{font-size:16px;margin-bottom:16px}
  .editor .row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px;align-items:end}
  .editor label{display:block;font-size:12px;font-weight:700;color:#64748b;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
  .editor input,.editor select{padding:8px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;font-family:inherit;width:100%}
  .editor .field{flex:1;min-width:120px}
  .msg{padding:12px 16px;border-radius:8px;margin-bottom:16px;font-size:14px;font-weight:600;display:none}
  .msg.ok{display:block;background:#dcfce7;color:#166534;border:1px solid #bbf7d0}
  .msg.err{display:block;background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
  .legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px}
  .legend span{display:flex;align-items:center;gap:5px;font-size:12px;color:#64748b}
  .legend .dot{width:12px;height:12px;border-radius:3px}
  .dot-ok{background:#dcfce7;border:1px solid #86efac}
  .dot-low{background:#fef3c7;border:1px solid #fcd34d}
  .dot-full{background:#fee2e2;border:1px solid #fca5a5}
</style>
</head>
<body>

<div class="top-bar">
  <h1>📅 Gestion des Disponibilités</h1>
  <a href="/admin/">← CMS</a>
  <a href="/admin/bookings.html">📋 Réservations</a>
  <a href="/booking/" target="_blank">Page Booking ↗</a>
</div>

<div class="wrap">
  <div id="msg" class="msg"></div>

  <div class="toolbar">
    <select id="room-select">
      <option value="dormitory">🛏 Dortoir (8 lits)</option>
      <option value="single">🚪 Chambre Single (4)</option>
      <option value="double">🛌 Chambre Double (3)</option>
    </select>
    <button class="btn btn-outline" id="prev-month">← Mois précédent</button>
    <strong id="month-label" style="font-size:16px;min-width:160px;text-align:center"></strong>
    <button class="btn btn-outline" id="next-month">Mois suivant →</button>
    <button class="btn btn-navy" id="select-all">Tout sélectionner</button>
    <button class="btn btn-outline" id="deselect-all">Désélectionner</button>
  </div>

  <div class="legend">
    <span><span class="dot dot-ok"></span> Disponible</span>
    <span><span class="dot dot-low"></span> Presque complet</span>
    <span><span class="dot dot-full"></span> Complet</span>
  </div>

  <div id="calendar" class="grid"></div>

  <div class="editor" id="editor">
    <h3>✏️ Modifier la sélection (<span id="sel-count">0</span> jours)</h3>
    <div class="row">
      <div class="field">
        <label>Prix / nuit (€)</label>
        <input type="number" id="ed-price" min="0" max="999" value="55">
      </div>
      <div class="field">
        <label>Total lits</label>
        <input type="number" id="ed-total" min="0" max="50" value="6">
      </div>
      <div class="field">
        <label>Réservés</label>
        <input type="number" id="ed-booked" min="0" max="50" value="0">
      </div>
    </div>
    <div class="row">
      <div class="field" style="flex:2">
        <label>Notes (optionnel)</label>
        <input type="text" id="ed-notes" placeholder="ex: groupe confirmé">
      </div>
      <div style="padding-top:20px">
        <button class="btn btn-fire" id="save-btn">💾 Enregistrer</button>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  var API_KEY = localStorage.getItem('nsc-admin-api-key') || '';
  if (!API_KEY) {
    API_KEY = prompt('Clé API Admin (ADMIN_API_KEY):');
    if (API_KEY) localStorage.setItem('nsc-admin-api-key', API_KEY);
  }

  var currentMonth = new Date();
  currentMonth.setDate(1);
  var roomType = 'dormitory';
  var data = {};
  var selected = new Set();
  var today = new Date(); today.setHours(0,0,0,0);

  var MONTHS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  var DAYS = ['Lu','Ma','Me','Je','Ve','Sa','Di'];

  function ds(d) { return d.toISOString().slice(0,10); }
  function showMsg(text, ok) {
    var el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + (ok ? 'ok' : 'err');
    setTimeout(function(){ el.className = 'msg'; }, 4000);
  }

  function fetchData() {
    var from = ds(currentMonth);
    var to = new Date(currentMonth);
    to.setMonth(to.getMonth() + 1);
    to.setDate(0);
    fetch('/api/admin-availability?from=' + from + '&to=' + ds(to), {
      headers: { 'x-api-key': API_KEY }
    })
    .then(function(r){ return r.json(); })
    .then(function(d){
      data = {};
      (d.rows || []).forEach(function(r){
        var dk = (r.date instanceof Date ? r.date.toISOString() : String(r.date)).slice(0,10);
        if (!data[dk]) data[dk] = {};
        data[dk][r.room_type] = r;
      });
      render();
    })
    .catch(function(e){ showMsg('Erreur réseau: ' + e.message, false); });
  }

  function render() {
    var m = currentMonth.getMonth(), y = currentMonth.getFullYear();
    document.getElementById('month-label').textContent = MONTHS[m] + ' ' + y;

    var grid = document.getElementById('calendar');
    var html = '';
    for (var i = 0; i < 7; i++) html += '<div class="dow">' + DAYS[i] + '</div>';

    var first = new Date(y, m, 1);
    var startDow = (first.getDay() + 6) % 7;
    var daysInMonth = new Date(y, m + 1, 0).getDate();

    for (var e = 0; e < startDow; e++) html += '<div class="empty"></div>';

    for (var day = 1; day <= daysInMonth; day++) {
      var date = new Date(y, m, day);
      var dateStr = ds(date);
      var isPast = date < today;
      var info = data[dateStr] && data[dateStr][roomType];
      var avail = info ? (info.total - info.booked) : 0;
      var price = info ? info.price_eur : '-';
      var cls = 'cell';
      if (isPast) cls += ' past';
      else if (!info || avail <= 0) cls += ' full';
      else if (avail <= 1) cls += ' low';
      if (selected.has(dateStr)) cls += ' selected';

      html += '<div class="' + cls + '" data-date="' + dateStr + '">';
      html += '<div class="day">' + day + '</div>';
      html += '<div class="price">' + (price !== '-' ? price + '€' : '—') + '</div>';
      html += '<div class="avail">' + (info ? avail + '/' + info.total : '—') + '</div>';
      html += '</div>';
    }
    grid.innerHTML = html;

    grid.querySelectorAll('.cell:not(.past)').forEach(function(cell){
      cell.onclick = function(){
        var d = cell.dataset.date;
        if (selected.has(d)) selected.delete(d); else selected.add(d);
        cell.classList.toggle('selected');
        updateSelCount();
      };
    });

    updateSelCount();
  }

  function updateSelCount() {
    document.getElementById('sel-count').textContent = selected.size;
    if (selected.size > 0) {
      var first = Array.from(selected).sort()[0];
      var info = data[first] && data[first][roomType];
      if (info) {
        document.getElementById('ed-price').value = info.price_eur;
        document.getElementById('ed-total').value = info.total;
        document.getElementById('ed-booked').value = info.booked;
        document.getElementById('ed-notes').value = info.notes || '';
      }
    }
  }

  document.getElementById('room-select').onchange = function(){
    roomType = this.value; selected.clear(); fetchData();
  };
  document.getElementById('prev-month').onclick = function(){
    currentMonth.setMonth(currentMonth.getMonth() - 1); selected.clear(); fetchData();
  };
  document.getElementById('next-month').onclick = function(){
    currentMonth.setMonth(currentMonth.getMonth() + 1); selected.clear(); fetchData();
  };
  document.getElementById('select-all').onclick = function(){
    document.querySelectorAll('.cell:not(.past)').forEach(function(c){
      selected.add(c.dataset.date); c.classList.add('selected');
    });
    updateSelCount();
  };
  document.getElementById('deselect-all').onclick = function(){
    selected.clear();
    document.querySelectorAll('.cell').forEach(function(c){ c.classList.remove('selected'); });
    updateSelCount();
  };

  document.getElementById('save-btn').onclick = function(){
    if (selected.size === 0) { showMsg('Sélectionnez au moins un jour.', false); return; }
    var body = {
      dates: Array.from(selected).sort(),
      room_type: roomType,
      price_eur: parseInt(document.getElementById('ed-price').value) || 55,
      total: parseInt(document.getElementById('ed-total').value) || 4,
      booked: parseInt(document.getElementById('ed-booked').value) || 0,
      notes: document.getElementById('ed-notes').value || null,
    };
    fetch('/api/admin-availability', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': API_KEY },
      body: JSON.stringify(body),
    })
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d.ok) {
        showMsg('✅ ' + d.updated + ' jours mis à jour.', true);
        selected.clear();
        fetchData();
      } else {
        showMsg('Erreur: ' + (d.error || 'Unknown'), false);
      }
    })
    .catch(function(e){ showMsg('Erreur réseau: ' + e.message, false); });
  };

  fetchData();
})();
</script>
</body>
</html>
