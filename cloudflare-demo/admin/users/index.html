<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Utilisateurs — Ngor Surfcamp Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0a2540; --navy2: #0d1f35; --sand: #f0c060;
      --fire: #ff5a1f; --fired: #e04a10; --white: #fff;
      --muted: rgba(255,255,255,0.55);
    }
    body {
      font-family: "Inter", system-ui, sans-serif;
      background: linear-gradient(135deg, #07192e 0%, #0a2540 100%);
      min-height: 100vh; color: #fff;
    }

    /* Top bar */
    #bar {
      position: fixed; top: 0; left: 0; right: 0; height: 52px;
      background: var(--navy2); border-bottom: 1px solid rgba(240,192,96,.22);
      display: flex; align-items: center; gap: 0; z-index: 999;
      padding: 0 16px; box-shadow: 0 2px 12px rgba(0,0,0,.35);
    }
    .bar-brand {
      display: flex; align-items: center; gap: 9px; text-decoration: none;
      padding-right: 18px; border-right: 1px solid rgba(255,255,255,.08);
    }
    .bar-brand span { font-size: 13px; font-weight: 700; color: #fff; }
    .bar-brand em { display: block; font-style: normal; font-size: 9.5px; color: var(--sand); letter-spacing: .08em; text-transform: uppercase; }
    .bar-back {
      display: flex; align-items: center; gap: 6px; padding: 5px 12px;
      color: var(--muted); text-decoration: none; font-size: 12px; font-weight: 600;
      border-radius: 6px; transition: color .15s; margin-left: 8px;
    }
    .bar-back:hover { color: #fff; }
    .bar-title {
      margin-left: auto; margin-right: auto;
      font-size: 13px; font-weight: 700; color: rgba(255,255,255,.7);
    }

    /* Main container */
    .main { padding: 80px 24px 48px; max-width: 620px; margin: 0 auto; }

    /* Auth gate */
    #auth-gate { text-align: center; padding: 60px 0; }
    #auth-gate h2 { font-size: 20px; margin-bottom: 10px; }
    #auth-gate p { color: rgba(255,255,255,.55); font-size: 14px; margin-bottom: 24px; }

    /* Cards */
    .card {
      background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.10);
      border-radius: 16px; padding: 28px 28px 24px; margin-bottom: 24px;
    }
    .card-title {
      font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 20px;
      display: flex; align-items: center; gap: 8px;
    }

    /* User rows */
    .user-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .user-row:last-child { border-bottom: none; }
    .user-info { display: flex; align-items: center; gap: 12px; }
    .user-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,90,31,.2); display: flex; align-items: center;
      justify-content: center; font-weight: 700; font-size: 14px; color: #ff8a5f;
      flex-shrink: 0;
    }
    .user-name { font-size: 14px; font-weight: 600; }
    .user-role {
      font-size: 11px; color: rgba(255,255,255,.45); text-transform: uppercase;
      letter-spacing: .06em; margin-top: 2px;
    }
    .user-actions { display: flex; gap: 8px; }

    /* Buttons */
    .btn {
      padding: 7px 14px; border: none; border-radius: 8px; font-size: 12.5px;
      font-weight: 600; cursor: pointer; transition: all .15s; font-family: inherit;
    }
    .btn-fire { background: var(--fire); color: #fff; }
    .btn-fire:hover { background: var(--fired); }
    .btn-ghost {
      background: rgba(255,255,255,.07); color: rgba(255,255,255,.7);
      border: 1px solid rgba(255,255,255,.12);
    }
    .btn-ghost:hover { background: rgba(255,255,255,.12); color: #fff; }
    .btn-danger { background: rgba(220,38,38,.2); color: #fca5a5; border: 1px solid rgba(220,38,38,.35); }
    .btn-danger:hover { background: rgba(220,38,38,.35); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-full { width: 100%; padding: 12px; font-size: 14px; margin-top: 4px; }

    /* Form fields */
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 11px; font-weight: 600; color: rgba(255,255,255,.5); letter-spacing: .07em; text-transform: uppercase; margin-bottom: 6px; }
    .field input {
      width: 100%; padding: 10px 13px; border-radius: 9px;
      border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.06);
      color: #fff; font-size: 14px; outline: none; transition: border .15s; font-family: inherit;
    }
    .field input:focus { border-color: rgba(255,90,31,.6); }
    .field input::placeholder { color: rgba(255,255,255,.25); }

    select.field-select {
      width: 100%; padding: 10px 13px; border-radius: 9px;
      border: 1px solid rgba(255,255,255,.12); background: #0a2540;
      color: #fff; font-size: 14px; outline: none; font-family: inherit; cursor: pointer;
    }

    /* Toast */
    #toast {
      position: fixed; bottom: 28px; right: 28px;
      background: #1a3a5c; border: 1px solid rgba(240,192,96,.4);
      color: #fff; padding: 13px 20px; border-radius: 10px;
      font-size: 13.5px; font-weight: 600; transform: translateY(80px); opacity: 0;
      transition: all .3s; z-index: 9999; max-width: 320px;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.error { border-color: rgba(255,90,31,.5); background: #2d1010; }

    /* Loading */
    .spin { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: -3px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- Top bar -->
<div id="bar">
  <a class="bar-brand" href="/admin/">
    <svg width="28" height="20" viewBox="0 0 28 20" fill="none">
      <path d="M2 14 C6 8, 10 6, 14 10 C18 14, 22 12, 26 7" stroke="#f0c060" stroke-width="2.2" stroke-linecap="round" fill="none"/>
      <path d="M2 18 C7 13, 11 11, 15 14.5 C19 18, 23 16, 26 12" stroke="#ff5a1f" stroke-width="1.6" stroke-linecap="round" fill="none" opacity=".7"/>
    </svg>
    <span>Ngor Surfcamp <em>Admin</em></span>
  </a>
  <a class="bar-back" href="/admin/">
    ← Retour au CMS
  </a>
  <span class="bar-title">Gestion des utilisateurs</span>
</div>

<!-- Main -->
<div class="main">

  <!-- Auth gate -->
  <div id="auth-gate">
    <h2>Accès restreint</h2>
    <p>Connectez-vous avec votre token GitHub pour gérer les utilisateurs.</p>
    <div class="field" style="max-width:300px;margin:0 auto 12px">
      <label>Token GitHub (PAT)</label>
      <input type="password" id="gate-token" placeholder="ghp_...">
    </div>
    <button class="btn btn-fire" id="gate-btn">Accéder</button>
    <div id="gate-error" style="color:#fca5a5;font-size:13px;margin-top:10px;display:none"></div>
  </div>

  <!-- Content (hidden until authenticated) -->
  <div id="content" style="display:none">

    <!-- Current users -->
    <div class="card">
      <div class="card-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Utilisateurs actifs
      </div>
      <div id="user-list"><span class="spin"></span></div>
    </div>

    <!-- Add user -->
    <div class="card">
      <div class="card-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
        Ajouter un utilisateur
      </div>
      <div class="field">
        <label>Identifiant</label>
        <input type="text" id="new-username" placeholder="ex: john">
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <input type="password" id="new-password" placeholder="Mot de passe initial">
      </div>
      <div class="field">
        <label>Rôle</label>
        <select id="new-role" class="field-select">
          <option value="admin">admin — accès complet</option>
          <option value="editor" selected>editor — édition des contenus</option>
        </select>
      </div>
      <button class="btn btn-fire btn-full" id="add-btn">Ajouter l'utilisateur</button>
    </div>

    <!-- Change password -->
    <div class="card">
      <div class="card-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        Changer un mot de passe
      </div>
      <div class="field">
        <label>Identifiant</label>
        <input type="text" id="pw-username" placeholder="Identifiant de l'utilisateur">
      </div>
      <div class="field">
        <label>Nouveau mot de passe</label>
        <input type="password" id="pw-new" placeholder="Nouveau mot de passe">
      </div>
      <button class="btn btn-ghost btn-full" id="pw-btn">Mettre à jour le mot de passe</button>
    </div>

  </div><!-- /content -->
</div><!-- /main -->

<div id="toast"></div>

<script>
(function() {
  'use strict';
  var token = '';

  function toast(msg, isErr) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'show' + (isErr ? ' error' : '');
    setTimeout(function() { el.className = ''; }, 3000);
  }

  function api(method, body) {
    return fetch('/api/admin-users', {
      method: method,
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: body ? JSON.stringify(body) : undefined
    }).then(function(r) { return r.json(); });
  }

  function loadUsers() {
    api('GET').then(function(data) {
      if (data.error) {
        document.getElementById('user-list').innerHTML = '<p style="color:#fca5a5;font-size:13px">' + data.error + '</p>';
        return;
      }
      var html = '';
      (data.users || []).forEach(function(u) {
        var initial = (u.username || '?')[0].toUpperCase();
        html += '<div class="user-row">' +
          '<div class="user-info">' +
          '<div class="user-avatar">' + initial + '</div>' +
          '<div><div class="user-name">' + u.username + '</div>' +
          '<div class="user-role">' + (u.role || 'editor') + '</div></div>' +
          '</div>' +
          '<div class="user-actions">' +
          '<button class="btn btn-danger" onclick="deleteUser(\'' + u.username + '\')">Supprimer</button>' +
          '</div></div>';
      });
      document.getElementById('user-list').innerHTML = html || '<p style="color:rgba(255,255,255,.4);font-size:13px">Aucun utilisateur</p>';
    }).catch(function() {
      document.getElementById('user-list').innerHTML = '<p style="color:#fca5a5;font-size:13px">Erreur de connexion</p>';
    });
  }

  window.deleteUser = function(username) {
    if (!confirm('Supprimer ' + username + ' ?')) return;
    api('DELETE', { username: username }).then(function(d) {
      if (d.success) { toast('Utilisateur supprimé'); loadUsers(); }
      else toast(d.error || 'Erreur', true);
    });
  };

  /* ── Auth gate ── */
  document.getElementById('gate-btn').addEventListener('click', function() {
    var t = document.getElementById('gate-token').value.trim();
    if (!t) return;
    token = t;
    var errEl = document.getElementById('gate-error');
    api('GET').then(function(data) {
      if (data.error) {
        errEl.textContent = data.error;
        errEl.style.display = 'block';
        token = '';
      } else {
        document.getElementById('auth-gate').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        loadUsers();
      }
    }).catch(function() {
      errEl.textContent = 'Erreur réseau';
      errEl.style.display = 'block';
      token = '';
    });
  });

  /* ── Add user ── */
  document.getElementById('add-btn').addEventListener('click', function() {
    var u = document.getElementById('new-username').value.trim();
    var p = document.getElementById('new-password').value;
    var r = document.getElementById('new-role').value;
    if (!u || !p) { toast('Remplissez tous les champs', true); return; }
    api('POST', { username: u, password: p, role: r }).then(function(d) {
      if (d.success) {
        toast('Utilisateur "' + u + '" ajouté');
        document.getElementById('new-username').value = '';
        document.getElementById('new-password').value = '';
        loadUsers();
      } else toast(d.error || 'Erreur', true);
    });
  });

  /* ── Change password ── */
  document.getElementById('pw-btn').addEventListener('click', function() {
    var u = document.getElementById('pw-username').value.trim();
    var p = document.getElementById('pw-new').value;
    if (!u || !p) { toast('Remplissez tous les champs', true); return; }
    api('PUT', { username: u, password: p }).then(function(d) {
      if (d.success) {
        toast('Mot de passe mis à jour');
        document.getElementById('pw-username').value = '';
        document.getElementById('pw-new').value = '';
      } else toast(d.error || 'Erreur', true);
    });
  });

})();
</script>
</body>
</html>
