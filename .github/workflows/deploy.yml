name: Pre-build check

# Vercel deploys automatically via its GitHub integration on every push to main.
# This workflow only runs build.py as a sanity check — Vercel does the actual deploy.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install requests

      - name: Run build.py (sanity check)
        run: python3 build.py

      - name: Confirm output directory exists
        run: |
          echo "cloudflare-demo pages: $(find cloudflare-demo -name '*.html' | wc -l)"
          echo "Build OK ✅"
