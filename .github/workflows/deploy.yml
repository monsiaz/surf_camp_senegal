name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-prod-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: |
          pip install pillow requests
          npm ci

      - name: Restore Vercel project link
        run: |
          mkdir -p .vercel
          printf '{"projectId":"%s","orgId":"%s"}' \
            "${{ secrets.VERCEL_PROJECT_ID }}" \
            "${{ secrets.VERCEL_ORG_ID }}" > .vercel/project.json

      - name: Build site
        env:
          PUBLIC_SITE_URL: https://surf-camp-senegal.vercel.app
        run: python3 build.py

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npx vercel build --prod --token "$VERCEL_TOKEN" --yes
          npx vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN" --yes
