name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-prod-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # needed to push version bump commit

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Restore Vercel project link
        run: |
          mkdir -p .vercel
          printf '{"projectId":"%s","orgId":"%s"}' \
            "${{ secrets.VERCEL_PROJECT_ID }}" \
            "${{ secrets.VERCEL_ORG_ID }}" > .vercel/project.json

      - name: Build site
        env:
          PUBLIC_SITE_URL: https://surf-camp-senegal.vercel.app
        run: python3 build.py

      # ── Quality gate (blocks deploy on critical failures) ───────────────────
      - name: Pre-deploy quality check
        run: python3 scripts/pre_deploy_check.py --fix

      # ── Commit version bump + changelog back to repo ────────────────────────
      - name: Commit version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json CHANGELOG.md || true
          git diff --cached --quiet || git commit -m "chore: bump build version [skip ci]"
          git push || true

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npx vercel build --prod --token "$VERCEL_TOKEN" --yes
          npx vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN" --yes
